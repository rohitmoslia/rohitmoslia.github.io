<style>
body{background:#0b0d0f;color:#f0ece0;font-family:'DM Sans',sans-serif;margin:0}
nav{position:fixed;width:100%;background:#0b0d0f;padding:15px 40px;border-bottom:1px solid #2a2d31}
.logo{color:#e8c84a;font-weight:bold}
section{padding:120px 40px}
.btn-primary{background:#e8c84a;color:#000;padding:10px 20px;text-decoration:none;border-radius:6px}
.btn-outline{border:1px solid #2a2d31;padding:10px 20px;text-decoration:none;color:#fff;border-radius:6px}
footer{text-align:center;padding:30px;border-top:1px solid #2a2d31}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
}

.gallery-item{
position:relative;
}

.gallery img{
width:100%;
border-radius:8px;
}

.delete-btn{
position:absolute;
top:5px;
right:5px;
background:red;
color:white;
border:none;
border-radius:50%;
width:22px;
height:22px;
cursor:pointer;
font-size:12px;
}

form input,form textarea{
display:block;
width:100%;
margin-bottom:10px;
padding:10px;
border-radius:5px;
border:none;
}

form button{
background:#e8c84a;
border:none;
padding:10px 20px;
cursor:pointer;
border-radius:6px;
}

</style>

<body>

<nav>
<span class="logo">RM.</span>
</nav>

<section>
<h1>Rohit Moslia</h1>
<p>Civil Engineer · Data Scientist · Digital Marketing Expert</p>

<a href="#portfolio" class="btn-primary">View Work</a> <a href="#contact" class="btn-outline">Contact</a>

</section>

<section id="portfolio">

<h2>Portfolio</h2>

<input type="file" id="fileInput" multiple>

<div class="gallery" id="gallery"></div>

</section>

<section id="contact">

<h2>Contact Me</h2>

<form action="https://formspree.io/f/xlgwyqlr" method="POST">

<input type="hidden" name="_subject" value="Portfolio Message">
<input type="hidden" name="_captcha" value="false">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<textarea name="message" placeholder="Your Message" required></textarea>

<button type="submit">Send Message</button>

</form>

</section>

<footer>

<p>© 2025 Rohit Moslia</p>

<div style="margin-top:10px">
👀 Visitors:
<img src="https://visitor-badge.laobi.icu/badge?page_id=rohitmoslia.rohitmoslia.github.io"/>
</div>

</footer>

<script>

function saveGallery(){

const imgs=[];
document.querySelectorAll('#gallery img').forEach(i=>{
imgs.push(i.src);
});

localStorage.setItem("portfolioImages",JSON.stringify(imgs));

}

function loadGallery(){

const gallery=document.getElementById("gallery");
const imgs=JSON.parse(localStorage.getItem("portfolioImages")||"[]");

imgs.forEach(src=>{

const div=document.createElement("div");
div.className="gallery-item";

div.innerHTML=`
<img src="${src}">
<button class="delete-btn">x</button>
`;

div.querySelector("button").onclick=function(){

div.remove();
saveGallery();

};

gallery.appendChild(div);

});

}

document.addEventListener("DOMContentLoaded",loadGallery);

document.getElementById("fileInput").addEventListener("change",function(e){

const files=e.target.files;
const gallery=document.getElementById("gallery");

Array.from(files).forEach(file=>{

if(!file.type.startsWith('image/')) return;

const reader=new FileReader();

reader.onload=function(ev){

const div=document.createElement("div");
div.className="gallery-item";

div.innerHTML=`
<img src="${ev.target.result}">
<button class="delete-btn">x</button>
`;

div.querySelector("button").onclick=function(){

div.remove();
saveGallery();

};

gallery.appendChild(div);

saveGallery();

};

reader.readAsDataURL(file);

});

});

</script>

</body>
