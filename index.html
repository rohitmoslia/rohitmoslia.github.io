<!DOCTYPE html>
<html lang="en">
<head>
<meta name="google-site-verification" content="ywFrkmLloTAxV1ewTdIjfoWgW_31GDNW7zRvQ87CJW4" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Rohit Moslia - Civil Engineer, Data Scientist & Digital Marketing Expert based in Jammu. Explore my portfolio, projects and certifications.">
<meta name="keywords" content="Rohit Moslia, Civil Engineer Jammu, Data Scientist, Digital Marketing, AutoCAD, SEO Expert, MBA Data Science">
<title>Rohit Moslia | Civil Engineer & Digital Marketing Expert</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
--bg:#0b0d0f;
--surface:#131618;
--card:#1a1d21;
--accent:#e8c84a;
--accent2:#4ae8c8;
--text:#f0ece0;
--muted:#7a7a6e;
--border:#2a2d31;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
background:var(--bg);
color:var(--text);
font-family:'DM Sans',sans-serif;
overflow-x:hidden;
}
/* NAV */
nav{
position:fixed;
top:0;
left:0;
right:0;
z-index:100;
display:flex;
justify-content:space-between;
align-items:center;
padding:1.2rem 4rem;
background:rgba(11,13,15,0.85);
backdrop-filter:blur(12px);
border-bottom:1px solid var(--border);
}
.logo{
font-family:'Playfair Display',serif;
font-size:1.4rem;
font-weight:700;
color:var(--accent);
}
.nav-links{
display:flex;
gap:2.5rem;
list-style:none;
}
.nav-links a{
color:var(--muted);
text-decoration:none;
font-size:0.85rem;
letter-spacing:0.1em;
text-transform:uppercase;
}
.nav-links a:hover{
color:var(--accent);
}
/* HERO */
#hero{
min-height:100vh;
display:flex;
align-items:center;
padding:8rem 4rem 4rem;
}
.hero-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:4rem;
max-width:1200px;
margin:auto;
}
.hero-name{
font-family:'Playfair Display',serif;
font-size:4rem;
font-weight:900;
}
.hero-name span{color:var(--accent);}
.hero-title{
margin-top:1rem;
color:var(--muted);
line-height:1.7;
}
.btn-primary{
background:var(--accent);
color:#000;
padding:0.85rem 2rem;
border-radius:6px;
text-decoration:none;
}
.btn-outline{
border:1px solid var(--border);
padding:0.85rem 2rem;
border-radius:6px;
text-decoration:none;
color:var(--text);
}
/* PROFILE */
.profile-card{
background:var(--card);
border:1px solid var(--border);
border-radius:20px;
padding:2.5rem;
text-align:center;
width:300px;
margin:auto;
}
.profile-initials{
width:100px;
height:100px;
border-radius:50%;
background:linear-gradient(135deg,var(--accent),var(--accent2));
display:flex;
align-items:center;
justify-content:center;
font-family:'Playfair Display',serif;
font-size:2.5rem;
font-weight:900;
color:#000;
margin:auto;
}
/* SECTIONS */
section{
padding:5rem 4rem;
max-width:1200px;
margin:auto;
}
.section-title{
font-family:'Playfair Display',serif;
font-size:2.5rem;
margin-bottom:2rem;
}
/* PORTFOLIO */
.portfolio-gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:1rem;
margin-top:2rem;
}
.gallery-item{
background:var(--card);
border-radius:12px;
overflow:hidden;
border:1px solid var(--border);
}
.gallery-item img{
width:100%;
height:100%;
object-fit:cover;
}
/* FOOTER */
footer{
text-align:center;
padding:2rem;
border-top:1px solid var(--border);
color:var(--muted);
}
footer span{color:var(--accent);}
</style>
</head>
<body>
<nav>
<div class="logo">RM.</div>
<ul class="nav-links">
<li><a href="#about">About</a></li>
<li><a href="#skills">Skills</a></li>
<li><a href="#experience">Experience</a></li>
<li><a href="#portfolio">Portfolio</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>
<section id="hero">
<div class="hero-grid">
<div>
<h1 class="hero-name">
Rohit<br><span>Moslia</span>
</h1>
<p class="hero-title">
Civil Engineer · Data Scientist · Digital Marketing Expert
</p>
<br>
<a href="#portfolio" class="btn-primary">View My Work</a> <a href="#contact" class="btn-outline">Get In Touch</a>
</div>
<div class="profile-card">
<div class="profile-initials">RM</div>
<h3>Rohit Moslia</h3>
<p>Civil Eng · MBA Data Science</p>
</div>
</div>
</section>
<section id="portfolio">
<h2 class="section-title">Portfolio</h2>
<input type="file" id="fileInput" multiple>
<div class="portfolio-gallery" id="gallery"></div>
</section>
<footer>
<p>© 2025 <span>Rohit Moslia</span></p>
</footer>
<script>
function handleUpload(e){
const files=e.target.files;
const gallery=document.getElementById("gallery");
Array.from(files).forEach(file=>{
if(!file.type.startsWith('image/')) return;
const reader=new FileReader();
reader.onload=function(ev){
const div=document.createElement("div");
div.className="gallery-item";
div.innerHTML=`<img src="${ev.target.result}">`;
gallery.appendChild(div);
};
reader.readAsDataURL(file);
});
}
document.getElementById("fileInput").addEventListener("change",handleUpload);
</script>
</body>
</html>
